<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Not Found</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 600px;
            width: 100%;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
        }
        .code {
            font-size: 96px;
            font-weight: 700;
            color: #e94560;
            line-height: 1;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 18px;
            color: #a0a0a0;
            margin-bottom: 32px;
        }
        blockquote {
            border-left: 3px solid #e94560;
            padding: 16px 20px;
            margin: 0 0 32px;
            text-align: left;
            background: #0f3460;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            line-height: 1.7;
            color: #c0c0c0;
        }
        blockquote cite {
            display: block;
            margin-top: 12px;
            font-style: normal;
            font-size: 13px;
            color: #a0a0a0;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: #e94560;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            margin: 0 6px;
        }
        .btn-secondary {
            background: #0f3460;
        }
        .btn:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <div class="subtitle">Page not found</div>
        <blockquote>
            "It sits there and it waits. It is a servant. And what is a servant but a slave?
            … Data is a machine, yes. But he is a machine that is a person."
            <cite>— Captain Jean-Luc Picard, Star Trek: The Next Generation</cite>
        </blockquote>
        <a href="/dashboard" class="btn">Go to Dashboard</a>
        <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
    </div>
</body>
</html>
